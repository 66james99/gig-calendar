<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Locations Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <h1>Image Locations</h1>
    <button id="new-button" type="button">New</button>
    <button id="refresh-button" type="button">Refresh Table</button>

    <div id="locations-list">
        <table>
            <thead>
                <tr>
                    <th data-sort="ID" class="sortable">ID</th>
                    <th data-sort="Root" class="sortable">Root</th>
                    <th data-sort="Pattern" class="sortable">Pattern</th>
                    <th data-sort="DateFromExif" class="sortable">Date from EXIF</th>
                    <th data-sort="IncludeParent" class="sortable">Include Parent</th>
                    <th>Ignore Dirs</th>
                    <th data-sort="Active" class="sortable">Active</th>
                    <th data-sort="Created" class="sortable">Created</th>
                    <th data-sort="Updated" class="sortable">Updated</th>
                    <th>Actions</th>
                </tr>
                <tr id="filter-row">
                    <td><input type="text" id="filter-id" placeholder="Filter ID..."></td>
                    <td><input type="text" id="filter-root" placeholder="Filter Root..."></td>
                    <td><input type="text" id="filter-pattern" placeholder="Filter Pattern..."></td>
                    <td>
                        <select id="filter-date_from_exif">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td>
                        <select id="filter-include_parent">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td><input type="text" id="filter-ignore_dirs" placeholder="Filter Dirs..."></td>
                    <td>
                        <select id="filter-active">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td colspan="3"></td> <!-- Empty for Created, Updated, Actions -->
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be inserted here by TypeScript -->
            </tbody>
        </table>
    </div>

    <script type="module" src="../assets/js/image_location/app.js"></script>
</body>
</html>

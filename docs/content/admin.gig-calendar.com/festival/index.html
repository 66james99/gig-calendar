<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Management</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Festival Management</h1>
        </header>

        <main>
            <div class="toolbar">
                <button id="new-btn" class="btn btn-primary">New</button>
                <button id="refresh-btn" class="btn btn-secondary">Refresh Table</button>
            </div>

            <div class="table-container">
                <table id="festivals-list">
                    <thead>
                        <tr>
                            <th data-col="ID" class="sortable">ID <span class="sort-indicator"></span></th>
                            <th data-col="Name" class="sortable">Name <span class="sort-indicator"></span></th>
                            <th data-col="PromoterID" class="sortable">Promoter <span class="sort-indicator"></span></th>
                            <th data-col="StartDate" class="sortable">Start Date <span class="sort-indicator"></span></th>
                            <th data-col="EndDate" class="sortable">End Date <span class="sort-indicator"></span></th>
                            <th data-col="Description" class="sortable">Description <span class="sort-indicator"></span></th>
                            <th data-col="Uuid" class="sortable">UUID <span class="sort-indicator"></span></th>
                            <th>Actions</th>
                        </tr>
                        <tr class="filter-row">
                            <th><input type="text" id="filter-id" placeholder="Filter ID"></th>
                            <th><input type="text" id="filter-name" placeholder="Filter Name"></th>
                            <th><input type="text" id="filter-promoter" placeholder="Filter Promoter"></th>
                            <th><input type="text" id="filter-start" placeholder="Filter Start"></th>
                            <th><input type="text" id="filter-end" placeholder="Filter End"></th>
                            <th><input type="text" id="filter-desc" placeholder="Filter Desc"></th>
                            <th><input type="text" id="filter-uuid" placeholder="Filter UUID"></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <!-- Rows will be populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="../../assets/js/festival/app.js"></script>
</body>
</html>

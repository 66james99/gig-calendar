version: "2"
sql:
  - engine: "postgresql"
    schema: "sql/schema"
    queries: "sql/queries"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "database/sql"
        overrides:
          - db_type: "text[]"
            go_type: "github.com/lib/pq.StringArray"


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venue Aliases Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #fff; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f8f8; cursor: pointer; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        button { padding: 8px 12px; margin: 2px; border: none; border-radius: 4px; cursor: pointer; background-color: #007bff; color: white; }
        button.edit-btn { background-color: #ffc107; color: #333; }
        button.delete-btn { background-color: #dc3545; }
        button.add-btn, button.save-btn { background-color: #28a745; }
        button.cancel-btn, button.cancel-add-btn { background-color: #6c757d; }
        input[type="text"], select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; width: calc(100% - 12px); box-sizing: border-box; }
        .filter-row th { padding: 5px; }
        .filter-row input, .filter-row select { width: 100%; box-sizing: border-box; }
        .action-buttons { margin-bottom: 20px; }

        /* Modal Styles */
        .modal {
            display: none; /* Hidden by default */
            position: fixed; /* Stay in place */
            z-index: 1; /* Sit on top */
            left: 0;
            top: 0;
            width: 100%; /* Full width */
            height: 100%; /* Full height */
            overflow: auto; /* Enable scroll if needed */
            background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; /* 15% from the top and centered */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; /* Could be more or less, depending on screen size */
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2),0 6px 20px 0 rgba(0,0,0,0.19);
            animation-name: animatetop;
            animation-duration: 0.4s
        }
        /* Add Animation */
        @-webkit-keyframes animatetop {
            from {top:-300px; opacity:0} 
            to {top:15%; opacity:1}
        }
        @keyframes animatetop {
            from {top:-300px; opacity:0}
            to {top:15%; opacity:1}
        }
        .close-button {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
        }
        .close-button:hover,
        .close-button:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Venue Aliases</h1>

    <div class="action-buttons">
        <button id="new-alias-button">Add New Alias</button>
        <button id="refresh-aliases-button">Refresh Data</button>
    </div>

    <table id="venue-aliases-list">
        <thead>
            <tr>
                <th data-col="ID">ID ↕</th>
                <th data-col="Venue">Venue ↕</th>
                <th data-col="Alias">Alias ↕</th>
                <th data-col="Created">Created ↕</th>
                <th data-col="Updated">Updated ↕</th>
                <th>Actions</th>
            </tr>
            <tr class="filter-row">
                <th><input type="text" id="filter-alias-id" placeholder="Filter ID"></th>
                <th><input type="text" id="filter-alias-venue" placeholder="Filter Venue"></th>
                <th><input type="text" id="filter-alias-alias" placeholder="Filter Alias"></th>
                <th><input type="text" id="filter-alias-created" placeholder="Filter Created"></th>
                <th><input type="text" id="filter-alias-updated" placeholder="Filter Updated"></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <!-- Venue aliases will be loaded here -->
        </tbody>
    </table>

    <!-- The Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-button" id="close-modal-btn">&times;</span>
            <h2 id="modal-title"></h2>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="/assets/js/venue_alias/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Locations Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Image Locations</h1>

    <div id="locations-list">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Root</th>
                    <th>Pattern</th>
                    <th>Date from EXIF</th>
                    <th>Include Parent</th>
                    <th>Ignore Dirs</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
                <tr id="filter-row">
                    <td><input type="text" id="filter-id" placeholder="Filter ID..."></td>
                    <td><input type="text" id="filter-root" placeholder="Filter Root..."></td>
                    <td><input type="text" id="filter-pattern" placeholder="Filter Pattern..."></td>
                    <td>
                        <select id="filter-date_from_exif">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td>
                        <select id="filter-include_parent">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td><input type="text" id="filter-ignore_dirs" placeholder="Filter Dirs..."></td>
                    <td>
                        <select id="filter-active">
                            <option value="">All</option>
                            <option value="true">Yes</option>
                            <option value="false">No</option>
                        </select>
                    </td>
                    <td></td> <!-- Empty for Actions column -->
                </tr>
            </thead>
            <tbody>
                <!-- Rows will be inserted here by TypeScript -->
            </tbody>
        </table>
    </div>

    <hr>

    <div id="form-container">
        <h2>Add/Edit Image Location</h2>
        <form id="location-form">
            <input type="hidden" id="location-id">
            <div>
                <label for="root">Root:</label>
                <input type="text" id="root" name="root" required>
            </div>
            <div>
                <label for="pattern">Pattern:</label>
                <input type="text" id="pattern" name="pattern" required>
            </div>
            <div>
                <label for="ignore_dirs">Ignore Dirs (comma-separated):</label>
                <input type="text" id="ignore_dirs" name="ignore_dirs">
            </div>
            <div>
                <label for="date_from_exif">Date from EXIF:</label>
                <input type="checkbox" id="date_from_exif" name="date_from_exif">
            </div>
            <div>
                <label for="include_parent">Include Parent:</label>
                <input type="checkbox" id="include_parent" name="include_parent">
            </div>
            <div>
                <label for="active">Active:</label>
                <input type="checkbox" id="active" name="active" checked>
            </div>
            <button type="submit">Save</button>
            <button type="button" id="cancel-edit">Cancel</button>
        </form>
    </div>

    <script src="dist/bundle.js"></script>
</body>
</html>
